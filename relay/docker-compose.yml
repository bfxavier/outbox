services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outbox-relay
    ports:
      - "8080:8080"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-please-change}
    volumes:
      - outbox-data:/data
    restart: unless-stopped

volumes:
  outbox-data:
